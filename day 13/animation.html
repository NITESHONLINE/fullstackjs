<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        height: 250px;
        width: 250px;
        border: 4px solid;
        /* transition: all 2s; */
        background: lightgreen;

        /* animation: name duration timing-function delay iteration-count direction fill-mode; */

        animation-name: moveBox;
        animation-duration: 2s;
        animation-iteration-count: infinite;
      }

      /* .box:hover{
            margin-top: 500px; 
        } */

      /* @keyframes moveBox {
           from{
            background-color: green;
           } to{
            background-color: black;
             margin-top: 500px; 
           } 
        } */

      @keyframes moveBox {
        0% {
          background-color: green;
          top: 0;
          left: 0;
        }
        25% {
          background-color: purple;
          margin-left: 500px;
          margin-top: 0;
        }
        50% {
          background-color: black;
          margin-top: 500px;
          margin-left: 500px;
        }
        75% {
          background-color: black;
          margin-top: 500px;
          margin-left: 0;
        }
        100% {
          background-color: black;
        }
      }
    </style>
  </head>
  <body>
    <div class="box"></div>
  </body>
</html>
